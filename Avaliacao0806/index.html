<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitMono // GitHub DevFinder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        mono: {
                            black: '#000000',
                            bg: '#050505',
                            card: '#111111',
                            input: '#0E0E0E',
                            border: '#222222',
                            borderHover: '#444444',
                            gray: '#666666',
                            muted: '#808080',
                            light: '#9A9A9A',
                            lightest: '#BDBDBD',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #222222;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444444;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body
    class="bg-mono-black text-mono-lightest min-h-screen font-sans flex flex-col items-center py-12 px-4 selection:bg-mono-lightest selection:text-mono-black">
    <main class="w-full max-w-2xl flex flex-col gap-8">
        <header class="text-center flex flex-col items-center gap-2">
            <div class="h-1 w-12 bg-mono-lightest mb-2 rounded-full"></div>
            <h1 class="text-3xl font-bold tracking-tight text-mono-lightest">Git<span
                    class="font-light text-mono-muted">Mono</span></h1>
            <p class="text-xs text-mono-muted uppercase tracking-widest font-medium">Buscador de Perfis & Repositórios
                GitHub</p>
        </header>
        <section
            class="bg-mono-card border border-mono-border p-6 rounded-2xl shadow-2xl transition-all duration-300 hover:border-mono-borderHover">
            <form id="search-form" class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-grow">
                    <input type="text" id="username-input" placeholder="Digite o nome de usuário do GitHub..."
                        class="w-full bg-mono-input border border-mono-border rounded-xl py-3 px-4 text-mono-lightest placeholder-mono-gray focus:outline-none focus:border-mono-lightest focus:ring-1 focus:ring-mono-lightest transition-all text-sm"
                        autocomplete="off">
                </div>
                <button type="submit"
                    class="bg-mono-lightest text-mono-black font-semibold px-6 py-3 rounded-xl hover:bg-[#A3A3A3] active:bg-mono-muted transition-all duration-200 text-sm flex items-center justify-center gap-2 cursor-pointer">
                    <span>Buscar</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>
        </section>
        <section id="message-container" class="hidden fade-in">
            <div
                class="bg-mono-card border border-mono-muted text-mono-lightest px-4 py-3.5 rounded-xl flex items-center gap-3 text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-mono-lightest shrink-0" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <span id="message-text" class="font-medium text-mono-light">Aviso aqui.</span>
            </div>
        </section>
        <section id="loader" class="hidden flex justify-center py-8">
            <div class="animate-spin rounded-full h-8 w-8 border-2 border-mono-border border-t-mono-lightest"></div>
        </section>
        <section id="profile-container" class="hidden fade-in flex flex-col gap-6">
        </section>
        <section id="repos-section" class="hidden fade-in flex flex-col gap-4">
            <div class="flex items-center justify-between border-b border-mono-border pb-2">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-mono-muted">Repositórios Recentes</h2>
                <span id="repo-count"
                    class="bg-mono-border text-mono-lightest text-xs px-2.5 py-0.5 rounded-full border border-mono-border">0</span>
            </div>
            <div id="repos-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            </div>
        </section>
        <script src="script.js"></script>
</body>

</html>
